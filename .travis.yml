sudo: required

language: generic

services: 
  - docker

before_install:
  - echo "start Creating an iamge with dockerfile"
  - docker build -t 1dilumn0/docker-react -f Dockerfile.dev .

script:
  - docker run -e CI=true 1dilumn0/docker-react npm run test -- -coverage

after_success:
  - echo "Test Success"

before_deploy:
  - echo "Start Creating a production image with Dockerfile"
  - docker build -t 1dilumn0/docker-react .

deploy:
  provider: elasticbeanstalk
  region : "ap-northeast-2"
  app: "react-app"
  env: "React-app-env"
  bucket_name: "elasticbeanstalk-ap-northeast-2-274062116193"
  bucket_path: "react-app"
  on:
    branch: main
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: $AWS_SECRET_KEY